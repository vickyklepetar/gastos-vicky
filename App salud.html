<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Salud de Eloisa y Amelia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito','Comic Sans MS','Chalkboard SE',cursive; background:#FBF8FF; min-height:100vh; }
    .app-wrapper { max-width:480px; margin:0 auto; min-height:100vh; background:#FBF8FF; position:relative; overflow:hidden; }
    .blob1 { position:fixed; top:-60px; left:-60px; width:220px; height:220px; background:radial-gradient(circle,#F4D6FF 0%,#FAF0FF 70%,transparent 100%); border-radius:50%; z-index:0; pointer-events:none; }
    .blob2 { position:fixed; bottom:-80px; right:-60px; width:260px; height:260px; background:radial-gradient(circle,#D6F0FF 0%,#EEF8FF 70%,transparent 100%); border-radius:50%; z-index:0; pointer-events:none; }
    .content { position:relative; z-index:1; padding:20px 20px 60px; }
    .header { text-align:center; padding:28px 20px 16px; position:relative; z-index:1; }
    .header-icon { font-size:32px; display:block; margin-bottom:8px; }
    .header-title { font-family:'Nunito','Comic Sans MS',cursive; font-size:23px; font-weight:900; color:#7C3AED; line-height:1.2; }
    .header-sub { font-size:13px; color:#A89BC0; font-weight:600; margin-top:4px; }
    .nav-wrap { padding:14px 16px 0; position:relative; z-index:1; }
    .nav-tabs { display:flex; gap:5px; background:#EDE8F8; border-radius:18px; padding:5px; margin-bottom:22px; }
    .nav-tab { flex:1; padding:9px 6px; border-radius:13px; border:none; font-family:'Nunito',cursive; font-size:12px; font-weight:800; cursor:pointer; transition:all 0.22s; background:transparent; color:#A89BC0; white-space:nowrap; }
    .nav-tab.active { background:white; color:#7C3AED; box-shadow:0 3px 12px rgba(124,58,237,0.18); }
    .section-label { font-size:12px; font-weight:800; color:#B0A0C8; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
    .girl-cards { display:flex; gap:12px; margin-bottom:24px; }
    .girl-card { flex:1; padding:18px 12px; border-radius:20px; border:2.5px solid transparent; cursor:pointer; text-align:center; transition:all 0.25s; font-family:'Nunito',cursive; }
    .girl-card.eloisa { background:linear-gradient(135deg,#FDF4FF 0%,#F5E8FF 100%); border-color:#E4CAFF; }
    .girl-card.amelia { background:linear-gradient(135deg,#F0F7FF 0%,#E0EEFF 100%); border-color:#C8DEFF; }
    .girl-card.selected.eloisa { border-color:#9B59D0; box-shadow:0 5px 18px rgba(155,89,208,0.28); }
    .girl-card.selected.amelia { border-color:#3B82F6; box-shadow:0 5px 18px rgba(59,130,246,0.28); }
    .girl-card:hover { transform:translateY(-3px); }
    .girl-avatar { width:56px; height:56px; margin:0 auto 10px; display:block; }
    .girl-name { font-size:17px; font-weight:900; }
    .eloisa .girl-name { color:#9B59D0; }
    .amelia .girl-name { color:#3B82F6; }
    .date-section { margin-bottom:22px; }
    .date-input { width:100%; padding:13px 16px; border-radius:14px; border:2px solid #E4CAFF; background:white; font-family:'Nunito',cursive; font-size:15px; font-weight:700; color:#555; outline:none; cursor:pointer; transition:border-color 0.2s; }
    .date-input:focus { border-color:#9B59D0; }
    .symptom-cards { display:flex; flex-direction:column; gap:10px; margin-bottom:22px; }
    .symptom-card,.appt-card { padding:15px 17px; border-radius:17px; border:2px solid transparent; cursor:pointer; display:flex; align-items:center; gap:12px; transition:all 0.22s; background:white; box-shadow:0 2px 9px rgba(0,0,0,0.05); }
    .symptom-card:hover,.appt-card:hover { transform:translateX(4px); }
    .symptom-card.selected { border-color:#9B59D0; background:#FBF4FF; }
    .appt-card.selected { border-color:#22A855; background:#F4FFF8; }
    .s-icon-col { font-size:26px; width:34px; text-align:center; }
    .s-info { flex:1; }
    .s-name { font-size:16px; font-weight:800; color:#333; }
    .s-desc { font-size:12px; color:#B0A0C8; font-weight:600; margin-top:2px; }
    .s-check { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; transition:all 0.2s; }
    .s-check.checked-purple { background:#9B59D0; color:white; }
    .s-check.checked-green { background:#22A855; color:white; }
    .s-check.unchecked { background:#EDE8F8; color:transparent; }
    .form-section { background:white; border-radius:22px; padding:22px; box-shadow:0 4px 18px rgba(0,0,0,0.07); margin-bottom:18px; }
    .form-title { font-size:17px; font-weight:900; margin-bottom:18px; display:flex; align-items:center; gap:8px; color:#333; }
    .form-group { margin-bottom:16px; }
    .form-label { font-size:12px; font-weight:800; color:#B0A0C8; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:7px; display:block; }
    .form-input,.form-textarea { width:100%; padding:12px 14px; border-radius:13px; border:2px solid #EDE8F8; background:#FDFBFF; font-family:'Nunito',cursive; font-size:14px; color:#444; outline:none; transition:border-color 0.2s; font-weight:600; resize:vertical; }
    .form-input:focus,.form-textarea:focus { border-color:#9B59D0; }
    .form-input.green:focus,.form-textarea.green:focus { border-color:#22A855; }
    .toggle-group { display:flex; gap:8px; flex-wrap:wrap; }
    .toggle-btn { padding:9px 14px; border-radius:50px; border:2px solid #EDE8F8; background:white; font-family:'Nunito',cursive; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s; color:#888; }
    .toggle-btn.active-purple { background:#9B59D0; border-color:#9B59D0; color:white; }
    .toggle-btn.active-green { background:#22A855; border-color:#22A855; color:white; }
    .btn-purple { width:100%; padding:15px; border-radius:17px; border:none; background:linear-gradient(135deg,#7C3AED 0%,#9B59D0 100%); font-family:'Nunito',cursive; font-size:16px; font-weight:900; color:white; cursor:pointer; box-shadow:0 5px 16px rgba(124,58,237,0.35); transition:all 0.2s; }
    .btn-purple:hover { transform:translateY(-2px); }
    .btn-outline-purple { width:100%; padding:13px; border-radius:17px; border:2px solid #9B59D0; background:white; font-family:'Nunito',cursive; font-size:14px; font-weight:800; color:#9B59D0; cursor:pointer; margin-top:10px; transition:all 0.2s; }
    .btn-green { width:100%; padding:15px; border-radius:17px; border:none; background:linear-gradient(135deg,#16A34A 0%,#22A855 100%); font-family:'Nunito',cursive; font-size:16px; font-weight:900; color:white; cursor:pointer; box-shadow:0 5px 16px rgba(34,168,85,0.35); transition:all 0.2s; }
    .btn-green:hover { transform:translateY(-2px); }
    .btn-outline-green { width:100%; padding:13px; border-radius:17px; border:2px solid #22A855; background:white; font-family:'Nunito',cursive; font-size:14px; font-weight:800; color:#22A855; cursor:pointer; margin-top:10px; }
    .success-msg { background:linear-gradient(135deg,#EAFFF2,#F0FFF7); border:2px solid #6EE09A; border-radius:16px; padding:18px; text-align:center; margin-bottom:18px; animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popIn { from{transform:scale(0.85);opacity:0} to{transform:scale(1);opacity:1} }
    .success-msg .sicon { font-size:30px; }
    .success-msg p { font-weight:800; color:#22A855; font-size:15px; margin-top:4px; }
    .filter-bar { display:flex; gap:7px; margin-bottom:14px; flex-wrap:wrap; }
    .filter-chip { padding:7px 13px; border-radius:50px; border:2px solid #DDD; font-family:'Nunito',cursive; font-size:12px; font-weight:800; cursor:pointer; transition:all 0.2s; background:white; color:#888; }
    .filter-chip.fc-all.active { background:#555; border-color:#555; color:white; }
    .filter-chip.fc-eloisa { border-color:#E4CAFF; color:#9B59D0; }
    .filter-chip.fc-eloisa.active { background:#9B59D0; border-color:#9B59D0; color:white; }
    .filter-chip.fc-amelia { border-color:#C8DEFF; color:#3B82F6; }
    .filter-chip.fc-amelia.active { background:#3B82F6; border-color:#3B82F6; color:white; }
    .record-list { display:flex; flex-direction:column; gap:11px; }
    .record-card { background:white; border-radius:17px; box-shadow:0 3px 11px rgba(0,0,0,0.07); overflow:hidden; transition:transform 0.2s; }
    .record-card:hover { transform:translateY(-2px); }
    .rh { padding:12px 15px; display:flex; align-items:center; gap:8px; }
    .rh.eloisa { background:linear-gradient(135deg,#F5E8FF,#FDF4FF); }
    .rh.amelia { background:linear-gradient(135deg,#E0EEFF,#F0F7FF); }
    .rh.turno { background:linear-gradient(135deg,#E8FFF2,#F4FFF8); }
    .rbadge { padding:4px 11px; border-radius:50px; font-size:11px; font-weight:900; font-family:'Nunito',cursive; }
    .rbadge.eloisa { background:#9B59D0; color:white; }
    .rbadge.amelia { background:#3B82F6; color:white; }
    .rbadge.turno { background:#22A855; color:white; }
    .ricon { font-size:19px; }
    .rname { font-size:14px; font-weight:900; color:#333; flex:1; }
    .rdate { font-size:11px; color:#B0A0C8; font-weight:700; }
    .rbody { padding:13px 15px; }
    .rdetail { font-size:13px; color:#555; font-weight:600; margin-bottom:9px; line-height:1.5; }
    .rtags { display:flex; gap:5px; flex-wrap:wrap; }
    .rtag { padding:3px 10px; border-radius:50px; font-size:11px; font-weight:800; font-family:'Nunito',cursive; }
    .tt { background:#FFF0E0; color:#E07800; }
    .tm { background:#E0EEFF; color:#2266DD; }
    .td { background:#E0FFE8; color:#118844; }
    .tx { background:#F0E0FF; color:#7722CC; }
    .tk { background:#FFF8E0; color:#CC8800; }
    .empty-state { text-align:center; padding:44px 20px; color:#C0A8D8; }
    .empty-state .eicon { font-size:42px; display:block; margin-bottom:10px; }
    .empty-state p { font-size:15px; font-weight:700; }
    .del-btn { background:none; border:none; cursor:pointer; font-size:15px; opacity:0.35; transition:opacity 0.2s; padding:3px; }
    .del-btn:hover { opacity:1; }
    .hidden { display:none !important; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState } = React;

const ELOISA_SVG = `<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" class="girl-avatar">
  <circle cx="28" cy="28" r="28" fill="#F0E4FF"/>
  <ellipse cx="28" cy="44" rx="12" ry="8" fill="#C084FC"/>
  <circle cx="28" cy="23" r="11" fill="#FDDCB5"/>
  <path d="M17 21 Q17 9 28 9 Q39 9 39 21 Q37 12 28 13 Q19 12 17 21Z" fill="#3D2206"/>
  <path d="M17 21 Q14 30 16 33 Q16 23 19 22Z" fill="#3D2206"/>
  <path d="M39 21 Q42 30 40 33 Q40 23 37 22Z" fill="#3D2206"/>
  <ellipse cx="24" cy="23" rx="1.6" ry="1.9" fill="#1A0A00"/>
  <ellipse cx="32" cy="23" rx="1.6" ry="1.9" fill="#1A0A00"/>
  <path d="M25 28 Q28 30.5 31 28" stroke="#C07060" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <ellipse cx="22" cy="26" rx="2.5" ry="1.4" fill="#FFAAA0" opacity="0.45"/>
  <ellipse cx="34" cy="26" rx="2.5" ry="1.4" fill="#FFAAA0" opacity="0.45"/>
</svg>`;

const AMELIA_SVG = `<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" class="girl-avatar">
  <circle cx="28" cy="28" r="28" fill="#DFF0FF"/>
  <ellipse cx="28" cy="44" rx="12" ry="8" fill="#60A5FA"/>
  <circle cx="28" cy="23" r="11" fill="#FDDCB5"/>
  <path d="M17 19 Q17 8 28 8 Q39 8 39 19 Q37 11 28 12 Q19 11 17 19Z" fill="#B06010"/>
  <path d="M17 19 Q14 29 16 33 Q16 21 19 20Z" fill="#B06010"/>
  <path d="M39 19 Q42 29 40 33 Q40 21 37 20Z" fill="#B06010"/>
  <rect x="35" y="13" width="6" height="11" rx="3" fill="#B06010"/>
  <ellipse cx="24" cy="23" rx="1.6" ry="1.9" fill="#1A0A00"/>
  <ellipse cx="32" cy="23" rx="1.6" ry="1.9" fill="#1A0A00"/>
  <path d="M25 28 Q28 30.5 31 28" stroke="#C07060" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <ellipse cx="22" cy="26" rx="2.5" ry="1.4" fill="#FFAAA0" opacity="0.45"/>
  <ellipse cx="34" cy="26" rx="2.5" ry="1.4" fill="#FFAAA0" opacity="0.45"/>
</svg>`;

const SYMPTOMS = {
  fiebre:  { icon:"🌡️", name:"Fiebre",  desc:"Temperatura, remedios y horarios" },
  vomitos: { icon:"🤢", name:"Vómitos", desc:"Síntomas, remedios y horarios" },
  tos:     { icon:"😮‍💨", name:"Tos",    desc:"Síntomas, remedios y horarios" },
};
const APPTS = {
  pediatra:     { icon:"👩‍⚕️", name:"Pediatra",          desc:"Control o consulta de rutina" },
  especialidad: { icon:"🏥",   name:"Otra especialidad", desc:"Cardiólogo, neurólogo, etc." },
  vacuna:       { icon:"💉",   name:"Vacuna",             desc:"Registro de vacunación" },
};

const today = () => new Date().toISOString().split("T")[0];
const fmt   = d  => { const [y,m,day]=d.split("-"); return `${day}/${m}/${y}`; };

function Avatar({ girl }) {
  const svg = girl === "eloisa" ? ELOISA_SVG : AMELIA_SVG;
  return <span dangerouslySetInnerHTML={{__html: svg}} />;
}

function GirlPicker({ girl, onPick }) {
  return (
    <div className="girl-cards">
      {[["eloisa","Eloisa"],["amelia","Amelia"]].map(([g,l]) => (
        <div key={g} className={`girl-card ${g} ${girl===g?"selected":""}`} onClick={() => onPick(g)}>
          <Avatar girl={g} />
          <div className="girl-name">{l}</div>
        </div>
      ))}
    </div>
  );
}

function HomeScreen({ onSave }) {
  const [girl,setGirl]   = useState(null);
  const [date,setDate]   = useState(today());
  const [sym,setSym]     = useState(null);
  const [form,setForm]   = useState({});
  const [saved,setSaved] = useState(false);
  const s = (k,v) => setForm(f => ({...f,[k]:v}));

  const save = () => {
    if (!girl || !sym) return;
    onSave({id:Date.now(), kind:"salud", girl, date, symptom:sym, form});
    setSaved(true);
    setTimeout(() => { setSaved(false); setGirl(null); setSym(null); setForm({}); setDate(today()); }, 2200);
  };

  return (
    <div>
      <div className="header">
        <span className="header-icon">🩺</span>
        <div className="header-title">¿Qué querés registrar?</div>
        <div className="header-sub">Elegí una hija y completá los síntomas</div>
      </div>
      <div className="content">
        {saved && <div className="success-msg"><div className="sicon">✅</div><p>¡Registro guardado!</p></div>}

        <div className="section-label">¿Quién no se siente bien?</div>
        <GirlPicker girl={girl} onPick={g => { setGirl(g); setSym(null); setForm({}); }} />

        <div className="date-section">
          <div className="section-label">Fecha</div>
          <input type="date" className="date-input" value={date} onChange={e => setDate(e.target.value)} />
        </div>

        {girl && <>
          <div className="section-label">Síntoma</div>
          <div className="symptom-cards">
            {Object.entries(SYMPTOMS).map(([k,c]) => (
              <div key={k} className={`symptom-card ${sym===k?"selected":""}`} onClick={() => { setSym(k); setForm({}); }}>
                <span className="s-icon-col">{c.icon}</span>
                <div className="s-info">
                  <div className="s-name">{c.name}</div>
                  <div className="s-desc">{c.desc}</div>
                </div>
                <div className={`s-check ${sym===k?"checked-purple":"unchecked"}`}>✓</div>
              </div>
            ))}
          </div>
        </>}

        {sym && <div className="form-section">
          <div className="form-title">{SYMPTOMS[sym].icon} {SYMPTOMS[sym].name} — {girl==="eloisa"?"Eloisa":"Amelia"}</div>

          {sym==="fiebre" && <div className="form-group">
            <label className="form-label">Temperatura</label>
            <input className="form-input" placeholder="Ej: 38.5 °C" value={form.temperatura||""} onChange={e => s("temperatura",e.target.value)} />
          </div>}

          <div className="form-group">
            <label className="form-label">Descripción / Detalles</label>
            <textarea className="form-textarea" rows="3"
              placeholder={sym==="fiebre"?"Ej: Empezó a las 14hs, estaba decaída...":sym==="vomitos"?"Ej: Vomitó 3 veces, no retiene líquidos...":"Ej: Tos seca, peor de noche..."}
              value={form.detalle||""} onChange={e => s("detalle",e.target.value)} />
          </div>

          <div className="form-group">
            <label className="form-label">Remedio administrado</label>
            <input className="form-input" placeholder="Ej: Ibuprofeno 200mg" value={form.remedio||""} onChange={e => s("remedio",e.target.value)} />
          </div>

          <div className="form-group">
            <label className="form-label">Hora del remedio</label>
            <input className="form-input" type="time" value={form.horaRemedio||""} onChange={e => s("horaRemedio",e.target.value)} />
          </div>

          <div className="form-group">
            <label className="form-label">¿Consultaste?</label>
            <div className="toggle-group">
              {["No fue necesario","Llamé a la pediatra","Visita a la pediatra","Vino médico a casa","Fui a la guardia"].map(op => (
                <button key={op} className={`toggle-btn ${form.consulta===op?"active-purple":""}`}
                  onClick={() => s("consulta", form.consulta===op?"":op)}>{op}</button>
              ))}
            </div>
          </div>

          <button className="btn-purple" onClick={save}>Guardar registro</button>
          <button className="btn-outline-purple" onClick={() => { setSym(null); setForm({}); }}>Cancelar</button>
        </div>}
      </div>
    </div>
  );
}

function TurnosScreen({ onSave }) {
  const [girl,setGirl]   = useState(null);
  const [date,setDate]   = useState(today());
  const [type,setType]   = useState(null);
  const [form,setForm]   = useState({});
  const [saved,setSaved] = useState(false);
  const s = (k,v) => setForm(f => ({...f,[k]:v}));

  const save = () => {
    if (!girl || !type) return;
    onSave({id:Date.now(), kind:"turno", girl, date, apptType:type, form});
    setSaved(true);
    setTimeout(() => { setSaved(false); setGirl(null); setType(null); setForm({}); setDate(today()); }, 2200);
  };

  return (
    <div>
      <div className="header">
        <span className="header-icon">📅</span>
        <div className="header-title">Turnos médicos</div>
        <div className="header-sub">Registrá consultas, especialistas y vacunas</div>
      </div>
      <div className="content">
        {saved && <div className="success-msg"><div className="sicon">✅</div><p>¡Turno guardado!</p></div>}

        <div className="section-label">¿Para quién es el turno?</div>
        <GirlPicker girl={girl} onPick={g => { setGirl(g); setType(null); setForm({}); }} />

        <div className="date-section">
          <div className="section-label">Fecha del turno</div>
          <input type="date" className="date-input" value={date} onChange={e => setDate(e.target.value)} />
        </div>

        {girl && <>
          <div className="section-label">Tipo de turno</div>
          <div className="symptom-cards">
            {Object.entries(APPTS).map(([k,c]) => (
              <div key={k} className={`appt-card ${type===k?"selected":""}`} onClick={() => { setType(k); setForm({}); }}>
                <span className="s-icon-col">{c.icon}</span>
                <div className="s-info">
                  <div className="s-name">{c.name}</div>
                  <div className="s-desc">{c.desc}</div>
                </div>
                <div className={`s-check ${type===k?"checked-green":"unchecked"}`}>✓</div>
              </div>
            ))}
          </div>
        </>}

        {type && <div className="form-section">
          <div className="form-title">{APPTS[type].icon} {APPTS[type].name} — {girl==="eloisa"?"Eloisa":"Amelia"}</div>

          {type==="especialidad" && <div className="form-group">
            <label className="form-label">Especialidad</label>
            <input className="form-input green" placeholder="Ej: Cardiología, Neurología..." value={form.especialidad||""} onChange={e => s("especialidad",e.target.value)} />
          </div>}

          {type==="vacuna" && <div className="form-group">
            <label className="form-label">Nombre de la vacuna</label>
            <input className="form-input green" placeholder="Ej: Triple viral, Varicela..." value={form.vacunaNombre||""} onChange={e => s("vacunaNombre",e.target.value)} />
          </div>}

          <div className="form-group">
            <label className="form-label">{type==="vacuna"?"Observaciones":"Motivo / Descripción"}</label>
            <textarea className="form-textarea green" rows="3"
              placeholder={type==="pediatra"?"Ej: Control de los 4 años, revisión de peso...":type==="especialidad"?"Ej: Derivada por soplo cardíaco, primera consulta...":"Ej: Segunda dosis, sin reacciones adversas..."}
              value={form.descripcion||""} onChange={e => s("descripcion",e.target.value)} />
          </div>

          <div className="form-group">
            <label className="form-label">Médico / Centro</label>
            <input className="form-input green" placeholder="Ej: Dra. García, Sanatorio Güemes" value={form.medico||""} onChange={e => s("medico",e.target.value)} />
          </div>

          <div className="form-group">
            <label className="form-label">Hora del turno</label>
            <input className="form-input green" type="time" value={form.hora||""} onChange={e => s("hora",e.target.value)} />
          </div>

          <div className="form-group">
            <label className="form-label">Estado</label>
            <div className="toggle-group">
              {["Pendiente","Realizado","Cancelado"].map(op => (
                <button key={op} className={`toggle-btn ${form.estado===op?"active-green":""}`}
                  onClick={() => s("estado", form.estado===op?"":op)}>{op}</button>
              ))}
            </div>
          </div>

          <button className="btn-green" onClick={save}>Guardar turno</button>
          <button className="btn-outline-green" onClick={() => { setType(null); setForm({}); }}>Cancelar</button>
        </div>}
      </div>
    </div>
  );
}

function HistorialScreen({ records, onDelete }) {
  const [fGirl,setFGirl] = useState("all");
  const [fKind,setFKind] = useState("all");

  const filtered = records
    .filter(r => fGirl==="all" || r.girl===fGirl)
    .filter(r => fKind==="all" || r.kind===fKind)
    .sort((a,b) => new Date(b.date)-new Date(a.date));

  return (
    <div>
      <div className="header">
        <span className="header-icon">📋</span>
        <div className="header-title">Historial</div>
        <div className="header-sub">{records.length} registro{records.length!==1?"s":""} guardado{records.length!==1?"s":""}</div>
      </div>
      <div className="content">
        <div className="filter-bar">
          {[["all","Todas","fc-all"],["eloisa","Eloisa","fc-eloisa"],["amelia","Amelia","fc-amelia"]].map(([v,l,c]) => (
            <button key={v} className={`filter-chip ${c} ${fGirl===v?"active":""}`} onClick={() => setFGirl(v)}>{l}</button>
          ))}
        </div>
        <div className="filter-bar">
          {[["all","Todo","fc-all"],["salud","Síntomas 🩺","fc-all"],["turno","Turnos 📅","fc-all"]].map(([v,l,c]) => (
            <button key={v} className={`filter-chip ${c} ${fKind===v?"active":""}`} onClick={() => setFKind(v)}>{l}</button>
          ))}
        </div>

        {filtered.length===0 ? (
          <div className="empty-state"><span className="eicon">✨</span><p>Sin registros todavía</p></div>
        ) : (
          <div className="record-list">
            {filtered.map(r => {
              const isTurno = r.kind==="turno";
              const cfg = isTurno ? APPTS[r.apptType] : SYMPTOMS[r.symptom];
              return (
                <div key={r.id} className="record-card">
                  <div className={`rh ${isTurno?"turno":r.girl}`}>
                    <span className={`rbadge ${isTurno?"turno":r.girl}`}>{r.girl==="eloisa"?"Eloisa":"Amelia"}</span>
                    <span className="ricon">{cfg?.icon}</span>
                    <span className="rname">{cfg?.name}</span>
                    <span className="rdate">{fmt(r.date)}</span>
                    <button className="del-btn" onClick={() => onDelete(r.id)}>🗑️</button>
                  </div>
                  <div className="rbody">
                    {(r.form.detalle||r.form.descripcion) &&
                      <div className="rdetail">{r.form.detalle||r.form.descripcion}</div>}
                    <div className="rtags">
                      {r.form.temperatura  && <span className="rtag tt">🌡️ {r.form.temperatura}</span>}
                      {r.form.remedio      && <span className="rtag tm">💊 {r.form.remedio}</span>}
                      {r.form.horaRemedio  && <span className="rtag tx">⏰ {r.form.horaRemedio}hs</span>}
                      {r.form.consulta && r.form.consulta!=="No fue necesario" &&
                        <span className="rtag td">👩‍⚕️ {r.form.consulta}</span>}
                      {r.form.especialidad && <span className="rtag tk">🏥 {r.form.especialidad}</span>}
                      {r.form.vacunaNombre && <span className="rtag tm">💉 {r.form.vacunaNombre}</span>}
                      {r.form.medico       && <span className="rtag td">🩺 {r.form.medico}</span>}
                      {r.form.hora         && <span className="rtag tx">⏰ {r.form.hora}hs</span>}
                      {r.form.estado       && <span className="rtag tk">{r.form.estado}</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [tab,setTab]       = useState("home");
  const [records,setRecords] = useState([]);
  const save = rec => setRecords(p => [rec,...p]);
  const del  = id  => setRecords(p => p.filter(r => r.id!==id));

  return (
    <div className="app-wrapper">
      <div className="blob1"/><div className="blob2"/>
      <div className="nav-wrap">
        <div className="nav-tabs">
          {[["home","🩺 Síntomas"],["turnos","📅 Turnos"],["historial","📋 Historial"]].map(([t,l]) => (
            <button key={t} className={`nav-tab ${tab===t?"active":""}`} onClick={() => setTab(t)}>{l}</button>
          ))}
        </div>
      </div>
      {tab==="home"       && <HomeScreen onSave={save}/>}
      {tab==="turnos"     && <TurnosScreen onSave={save}/>}
      {tab==="historial"  && <HistorialScreen records={records} onDelete={del}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
